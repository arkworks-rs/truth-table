[package]
name = "arithmetic"
version = "0.1.0"
edition = "2024"

[dependencies]
ark-ff = { version = "0.5.0", default-features = false }
ark-poly = { version = "0.5.0", default-features = false }
kit = { path = "../kit" }


[dev-dependencies]

ark-test-curves = { version = "0.5.0", default-features = false, features = [
    "bls12_381_scalar_field",
] }


[features]
default = ["parallel"]
# extensive sanity checks that are useful for debugging
extensive_sanity_checks = []
parallel = ["kit/parallel", "ark-ff/parallel", "ark-poly/parallel"]
print-trace = ["kit/print-trace"]

[package]
name = "tt-poneglyph-bench"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

# Standalone bench driver — kept out of the workspace's default build so the
# heavy halo2 deps (halo2_proofs, halo2curves, …) only compile when explicitly
# requested via `cargo run -p tt-poneglyph-bench`.
[lints.rust]
# The upstream PoneglyphDB crate has lots of warnings; don't fail our build on them.
warnings = "warn"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Aliased to `poneglyph` on the consumer side — the upstream crate name is still
# `halo2-experiments` in PoneglyphDB's own Cargo.toml.
poneglyph = { package = "halo2-experiments", git = "https://github.com/alireza-shirzad/PoneglyphDB", branch = "main" }

[[bin]]
name = "tt-poneglyph-bench"
path = "src/main.rs"

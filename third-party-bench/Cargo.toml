[workspace]
members = ["."]
resolver = "2"

[patch.crates-io]
arrow-arith = { path = "patches/arrow-arith-51.0.0" }

[package]
name = "third-party-bench"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
proof-of-sql-benchlib = { path = "../../sxt-proof-of-sql/crates/proof-of-sql-benchlib" }
proof-of-sql = { path = "../../sxt-proof-of-sql/crates/proof-of-sql" }
qedb = { git = "https://github.com/alireza-shirzad/qedb.git" }
tpch-data = { path = "../tpch-data" }
exec = { path = "../exec" }
tokio = { version = "1", features = ["rt", "macros"] }
parquet = { version = "57" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-tree = "0.3"
arrow = { version = "57" }
chrono = "0.4"

[[bench]]
name = "sxt_proof_of_sql"
harness = false

[[bench]]
name = "truth_table"
harness = false

[[bench]]
name = "qedb"
harness = false

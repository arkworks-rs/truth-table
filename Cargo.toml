[workspace]

members = [
    "col-toolbox",
    "col-toolbox-bench",
    "arithmetic",
    "sql-toolbox",
    "sql-toolbox-bench",
]

# Add dependencies here

[workspace.dependencies]

# Arkworks dependencies
ark-serialize = { version = "0.5.0", default-features = false, features = [
    "derive",
] }
ark-std = { version = "0.5.0", default-features = false }
ark-ff = { version = "0.5.0", default-features = false }
ark-ec = { version = "0.5.0", default-features = false }
ark-poly = { version = "0.5.0", default-features = false }
ark-piop = { path = "../ark-piop/piop", default-features = false }

# Other dependencies
itertools = "0.14"
csv = { version = "1.3.1" }
rayon = { version = "1.5.2", default-features = false }
proc-macro-hack = "0.5"
derivative = { version = "2", features = ["use_core"] }
thiserror = "2.0.11"
rand_chacha = { version = "0.9.0", default-features = false }
uuid = { version = "1.2", features = ["v4"] }
datafusion = "46.0.0"
tokio = { version = "^1.41.0", features = ["rt", "macros", "rt-multi-thread"] }
merlin = { version = "3.0.0", default-features = false }
futures = "0.3"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
log = "0.4"
env_logger = "0.11.6"
# Testing dependencies
ark-test-curves = { version = "0.5.0", default-features = false, features = [
    "bls12_381_curve",
] }
divan = "0.1.17"
either = "1.8.0"

[workspace.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "../docs-header.html"]

[patch.crates-io]
ark-std = { git = "https://github.com/arkworks-rs/std" }


[workspace.metadata.cargo-alias]
test-all = "sh scripts/test.sh"
